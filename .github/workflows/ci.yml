name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # vkpace-hud pulls in eframe (wgpu + wayland + x11), which the
      # workspace clippy invocation now compiles. Install its native deps
      # so clippy doesn't fail on missing -lwayland-client / -lxkbcommon.
      - name: Install eframe native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libgtk-3-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: |
          test -f target/release/libVkLayer_VKPACE_reduce_latency.so
          test -f target/release/VkLayer_VKPACE_reduce_latency.json

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Integration test dlopen's the built cdylib via CARGO_MANIFEST_DIR;
      # build it first so the path resolution short-circuits without
      # re-invoking cargo from inside the test.
      - run: cargo build --lib
      - name: Install eframe native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libgtk-3-dev
      - run: cargo test --workspace --all-features

  miri:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: miri test (pnext + bitset + config + delay_controller)
        run: |
          cargo +nightly miri test pnext::tests
          cargo +nightly miri test timestamp_pool::tests
          cargo +nightly miri test config::tests
          cargo +nightly miri test delay_controller::tests

  # Release build of the standalone telemetry HUD. Kept separate from the
  # layer's `build` job so the layer build stays lean and free of GUI deps.
  hud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install eframe native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libgtk-3-dev
      - run: cargo build --release -p vkpace-hud

  # Real loader smoke test: load the cdylib through the Vulkan loader
  # against a Mesa software ICD (lavapipe) and run a few `vkcube`-equivalent
  # frames. Catches loader-side regressions (handshake, dispatch chain,
  # extension fallback) that the unit tests can't see.
  lavapipe-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install lavapipe + vulkaninfo
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan1
      - name: Build layer
        run: cargo build --release
      - name: vulkaninfo through layer (lavapipe ICD)
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
          VK_ADD_LAYER_PATH: ${{ github.workspace }}/target/release
          VK_LOADER_LAYERS_ENABLE: VK_LAYER_VKPACE_reduce_latency
          VKPACE_LOG: info
          VKPACE_STATS_INTERVAL: 1
        run: |
          vulkaninfo --summary | tee vulkaninfo.out
          grep -q "lavapipe\|llvmpipe" vulkaninfo.out
