name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: |
          test -f target/release/libVkLayer_VKPACE_reduce_latency.so
          test -f target/release/VkLayer_VKPACE_reduce_latency.json

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Integration test dlopen's the built cdylib via CARGO_MANIFEST_DIR;
      # build it first so the path resolution short-circuits without
      # re-invoking cargo from inside the test.
      - run: cargo build --lib
      - run: cargo test --all-features

  miri:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: miri test (pnext + bitset + config + delay_controller)
        run: |
          cargo +nightly miri test pnext::tests
          cargo +nightly miri test timestamp_pool::tests
          cargo +nightly miri test config::tests
          cargo +nightly miri test delay_controller::tests
